parameters:
  loss_weights:
    # W-part
    L_x: 50.0
    # lep-part
    L_y: 10.0
    # N(0, 1) sampling part
    L_z: 10.0
    # padding part (if any)
    L_pad: 5.0
    # paper-style noisy-padding inverse consistency pass
    L_pad_noise: 5.0
    # reverse consistency on generated [y_pred, z]
    L_x_gen: 0.0
    # monitoring losses
    L_x_huber: 0.1
  batch_size: 256
  epochs: 1024
  learning_rate: 5.0e-5
  num_blocks: 16
  # observed variables dimension (2 lep)
  obs_dim: 8
  # number of lacking constraints (two neutrinos are massless)
  lack_dim: 4
  # dataloader settings (set num_workers > 0 only if stable)
  # TODO: fix (sometimes) hang when num_workers > 0
  num_workers: 2
  persistent_workers: false
  pin_memory: true
  prefetch_factor: 2

paths:
  data_path: "/root/data/danning_h5/ypeng/mc20_qe_v4_recotruth_merged.h5"
  project_name: "hww_inn_regressor-lep"
  ckpt_path: "/root/work/ww-flow_nohl/logs/"
